<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videogames Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-logo">🎮</div>
            <h1>Videogames Collection</h1>
            <div class="header-tagline">// Welcome to your Library</div>
        </div>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Main page</a></li>
            <li><a href="items.html">All Games</a></li>
            <li><a href="favourites.html">Favourites</a></li>
        </ul>
    </nav>
    <main>
        <section id="intro">
            <div class="hero-section">
                <div class="hero-text">
                    <h2>Welcome to the Collection!</h2>
                    <p>Your personal library of the best titles.</p>
                </div>
                <div class="hero-image-grid">
                    <div class="hero-img-cell">
                        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&q=80" alt="Gaming setup">
                    </div>
                    <div class="hero-img-cell">
                        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400&q=80" alt="Retro gaming">
                    </div>
                    <div class="hero-img-cell">
                        <img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=400&q=80" alt="Game controller">
                    </div>
                </div>
            </div>
        </section>
        <section id="stats">
            <h2>Statistics</h2>
            <div class="stats-container">
                <div class="stat-card">
                    <h3>Total Games</h3>
                    <p>7</p>
                </div>
                <div class="stat-card">
                    <h3>Categories</h3>
                    <p>6</p>
                </div>
            </div>
        </section>
    </main>
    <footer><p>Made by: Balla David & Kuszko Zsombor</p></footer>
</body>
</html>
